<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MLflow Compare</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1c25;--bg3:#262830;--border:#363840;
  --fg:#e6e6e9;--fg2:#9ca3af;--accent:#6366f1;--accent2:#818cf8;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --radius:6px;
}
html{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;background:var(--bg);color:var(--fg)}
body{padding:0;min-height:100vh}
a{color:var(--accent2)}

/* Layout */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:600;white-space:nowrap}
.topbar input[type=text]{flex:1;max-width:420px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:13px}
.topbar input[type=text]:focus{outline:none;border-color:var(--accent)}

.main{display:flex;gap:0;height:calc(100vh - 45px)}
.sidebar{width:240px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);padding:14px;overflow-y:auto;flex-shrink:0}
.content{flex:1;padding:16px 20px;overflow-y:auto}

/* Sidebar sections */
.sb-section{margin-bottom:18px}
.sb-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg2);margin-bottom:8px}
.sb-section input[type=text]{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:12px;margin-bottom:6px}
.sb-section input[type=text]:focus{outline:none;border-color:var(--accent)}
.sb-section label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg2);cursor:pointer}
.sb-section input[type=range]{width:100%;accent-color:var(--accent)}
.sb-section select{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--fg);font-size:12px;cursor:pointer;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-group{display:flex;gap:6px;flex-wrap:wrap}

/* Table */
.run-table-wrap{overflow-x:auto;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{position:sticky;top:0;background:var(--bg2);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-weight:600;color:var(--fg2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--bg2)}
td.mono{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:11px;color:var(--fg2)}
.status-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;text-transform:uppercase}
.status-FINISHED{background:#166534;color:#bbf7d0}
.status-RUNNING{background:#854d0e;color:#fef08a}
.status-FAILED{background:#991b1b;color:#fecaca}
.tag-chip{display:inline-block;padding:1px 5px;margin:1px 2px;border-radius:3px;background:var(--bg3);color:var(--fg2);font-size:10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Metric selector */
.metric-selector{margin-bottom:16px}
.ms-box{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);max-height:180px;overflow-y:auto;padding:4px}
.ms-box label{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:3px;font-size:12px;cursor:pointer}
.ms-box label:hover{background:var(--bg2)}
.ms-box input[type=checkbox]{accent-color:var(--accent)}
.ms-search{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:12px;margin-bottom:4px}
.ms-search:focus{outline:none;border-color:var(--accent)}
.ms-selected{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ms-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;background:var(--accent);color:#fff;font-size:11px;cursor:pointer}
.ms-pill:hover{background:var(--red)}
.ms-pill::after{content:"×";font-weight:bold}

/* Selected runs panel */
.selected-runs{margin-bottom:16px}
.sr-card{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.sr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-legend-input{width:100%;padding:3px 6px;border:1px solid transparent;border-radius:3px;background:transparent;color:var(--fg);font-size:12px;font-weight:600;transition:border-color .15s}
.sr-legend-input:hover{border-color:var(--border)}
.sr-legend-input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.sr-exp{font-size:10px;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:7px}
.sr-remove{background:none;border:none;color:var(--fg2);font-size:16px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.sr-remove:hover{color:var(--red)}

/* Parameters comparison */
.params-table-wrap{overflow:auto;max-height:420px;border:1px solid var(--border);border-radius:var(--radius);margin-top:8px;margin-bottom:16px}
.params-table{border-collapse:collapse;font-size:12px}
.params-table thead th{position:sticky;top:0;background:var(--bg2);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-weight:600;color:var(--fg2);font-size:11px;white-space:nowrap;z-index:2}
.params-table thead th:first-child{position:sticky;left:0;z-index:3;background:var(--bg2)}
.params-table tbody td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.params-table tbody td:first-child{position:sticky;left:0;background:var(--bg);z-index:1;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:11px;color:var(--fg2)}
.params-table tbody tr:hover td{background:var(--bg2)}
.params-table tbody tr:hover td:first-child{background:var(--bg2)}
.param-diff{background:rgba(99,102,241,0.10) !important}
.params-toggle-active{background:var(--accent) !important;border-color:var(--accent) !important;color:#fff !important}
.param-search-results{max-height:150px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:none;margin-bottom:6px}
.param-search-results .param-search-item{padding:5px 10px;font-size:12px;cursor:pointer;color:var(--fg)}
.param-search-results .param-search-item:hover{background:var(--bg3)}
.param-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.params-empty{padding:20px;text-align:center;color:var(--fg2);font-size:12px}

/* Poll indicator */
.poll-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg2);padding:6px 0}
.poll-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}

/* Chart grid */
.chart-grid{display:grid;gap:14px;margin-top:14px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;position:relative}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.chart-title{font-size:12px;font-weight:600;color:var(--fg2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.chart-toolbar{display:flex;gap:4px;flex-shrink:0}
.chart-toolbar button{background:none;border:1px solid var(--border);border-radius:3px;color:var(--fg2);font-size:10px;padding:2px 6px;cursor:pointer;transition:background .1s}
.chart-toolbar button:hover{background:var(--bg3);color:var(--fg)}
.chart-empty{padding:30px;text-align:center;color:var(--fg2);font-size:12px}

/* uPlot selection box (drag-to-zoom highlight) */
.u-select{background:rgba(99,102,241,0.15) !important;border:1px solid rgba(99,102,241,0.5) !important}

/* Override uPlot legend for dark theme */
.u-legend{font-size:11px !important;padding:4px 0 0 !important}
.u-legend th{font-weight:600;color:var(--fg2)}
.u-legend td{color:var(--fg)}
.u-series>*{padding:2px 4px !important}

/* Toast / info bar */
.info-bar{padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg2);font-size:12px;margin-bottom:12px}
.info-bar.error{border-color:var(--red);color:var(--red)}
.info-bar.success{border-color:var(--green);color:var(--green)}

/* Loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--fg2)}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{flex-direction:column}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>MLflow Compare</h1>
  <input type="text" id="expInput" placeholder="Experiment name, e.g. group/experiment">
  <button class="btn btn-primary" id="loadBtn">Load</button>
  <button class="btn" id="refreshBtn" title="Clear cache &amp; reload">&#x21bb; Refresh</button>
  <span id="topStatus"></span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-section">
      <h3>Run Type</h3>
      <label><input type="radio" name="runtype" value="training" checked> Training</label>
      <label style="margin-top:4px"><input type="radio" name="runtype" value="evaluation"> Evaluation</label>
    </div>
    <div class="sb-section">
      <h3>Filters</h3>
      <input type="text" id="nameFilter" placeholder="Filter by run name…">
      <input type="text" id="tagFilter" placeholder="Filter by tags…">
    </div>
    <div class="sb-section">
      <h3>Charts per row</h3>
      <input type="range" id="colSlider" min="1" max="4" value="3">
      <div style="text-align:center;color:var(--fg2);font-size:11px"><span id="colVal">3</span></div>
    </div>
    <div class="sb-section">
      <h3>X-Axis</h3>
      <label><input type="radio" name="xaxis" value="step" checked> Step</label>
      <label style="margin-top:4px"><input type="radio" name="xaxis" value="wall"> Relative Wall Time</label>
    </div>
    <div class="sb-section">
      <h3>Y-Axis Scale</h3>
      <label><input type="radio" name="yscale" value="linear" checked> Linear</label>
      <label style="margin-top:4px"><input type="radio" name="yscale" value="log"> Log</label>
    </div>
    <div class="sb-section">
      <h3>Smoothing</h3>
      <input type="range" id="smoothSlider" min="0" max="0.99" step="0.01" value="0">
      <div style="text-align:center;color:var(--fg2);font-size:11px"><span id="smoothVal">0</span></div>
    </div>
    <div class="sb-section">
      <h3>Chart Grouping</h3>
      <select id="groupMode">
        <option value="separate">One chart per metric</option>
        <option value="prefix">Auto-group by prefix</option>
        <option value="overlay">All metrics on one chart</option>
      </select>
    </div>
    <div class="sb-section">
      <h3>Actions</h3>
      <div class="btn-group" style="flex-direction:column">
        <button class="btn btn-sm" id="selectAllBtn">Select all visible</button>
        <button class="btn btn-sm" id="clearSelBtn">Clear selection</button>
        <button class="btn btn-sm" id="copyFilterBtn">Copy MLflow filter</button>
      </div>
    </div>
    <div class="sb-section">
      <h3>View</h3>
      <div class="btn-group" style="flex-direction:column">
        <button class="btn btn-sm" id="shareViewBtn">Share URL</button>
        <button class="btn btn-sm" id="exportViewBtn">Export .json</button>
        <button class="btn btn-sm" id="importViewBtn">Import .json</button>
      </div>
      <input type="file" id="importFileInput" accept=".json" style="display:none">
    </div>
  </div>

  <div class="content">
    <div id="infoArea"></div>

    <div id="expInfo" style="margin-bottom:10px;font-size:11px;color:var(--fg2)"></div>

    <!-- Runs table -->
    <div id="tableSection" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <h2 style="font-size:14px;font-weight:600">Runs <span id="runCount" style="color:var(--fg2);font-weight:400"></span></h2>
      </div>
      <div class="run-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:30px"><input type="checkbox" id="thCheckAll" title="Toggle all visible"></th>
              <th>Run Name</th>
              <th>Start Time</th>
              <th>Status</th>
              <th>Run ID</th>
              <th>Tags</th>
            </tr>
          </thead>
          <tbody id="runTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Selected runs legend panel -->
    <div id="selectedRunsSection" style="display:none">
      <h2 style="font-size:14px;font-weight:600;margin-bottom:8px">Selected Runs</h2>
      <div id="selectedRunsList" class="selected-runs"></div>
    </div>

    <!-- Parameters comparison -->
    <div id="paramsSection" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <h2 style="font-size:14px;font-weight:600">Parameters</h2>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="btn btn-sm" id="paramsDiffToggle">Show diffs only</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <input type="text" class="ms-search" id="paramSearch" placeholder="Type to search params…" style="margin-bottom:0;flex:1">
        <button class="btn btn-primary btn-sm" id="paramAddBtn">Add</button>
      </div>
      <div id="paramSearchResults" class="param-search-results"></div>
      <div class="ms-selected" id="paramPills"></div>
      <div class="params-table-wrap" id="paramsTableWrap">
        <table class="params-table" id="paramsTable"></table>
      </div>
    </div>

    <!-- Metric selector -->
    <div id="metricSection" style="display:none">
      <h2 style="font-size:14px;font-weight:600;margin-bottom:8px">Metric Comparison</h2>
      <div class="metric-selector">
        <input type="text" class="ms-search" id="metricSearch" placeholder="Search metrics…">
        <div class="ms-box" id="metricBox"></div>
        <div class="ms-selected" id="metricPills"></div>
        <div style="margin-top:8px">
          <button class="btn btn-primary btn-sm" id="compareBtn">Compare</button>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div id="pollIndicator" class="poll-indicator" style="display:none">
      <span class="poll-dot"></span> Auto-refreshing every 30s
    </div>
    <div id="chartGrid" class="chart-grid"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
(function(){
"use strict";

const DEFAULT_METRICS_TRAINING = [
  "actor/episode_return_mean",
  "actor/connected_ratio_mean",
  "actor/is_fully_connected_mean",
  "trainer/total_loss_mean",
  "trainer/clip_fraction_mean",
  "trainer/critic_stats/vf_loss_mean",
  "trainer/entropy_stats/policy_mean",
];

const DEFAULT_METRICS_EVALUATION = [
  "logs/blood_pressure/run_1/postprocessing_num_connections_missing",
  "logs/colororgan/run_1/postprocessing_num_connections_missing",
  "logs/lfo4/run_1/postprocessing_num_connections_missing",
  "logs/mainboard/run_1/postprocessing_num_connections_missing",
  "logs/onebond/run_1/postprocessing_num_connections_missing",
  "logs/opreR3/run_1/postprocessing_num_connections_missing",
  "logs/pob96/run_1/postprocessing_num_connections_missing",
  "logs/strf/run_1/postprocessing_num_connections_missing",
];

function getDefaultMetrics() {
  const radio = document.querySelector('input[name="runtype"]:checked');
  return (radio && radio.value === "evaluation") ? DEFAULT_METRICS_EVALUATION : DEFAULT_METRICS_TRAINING;
}

const COLORS = [
  "#6366f1","#22c55e","#f59e0b","#ef4444","#06b6d4","#ec4899",
  "#8b5cf6","#14b8a6","#f97316","#64748b","#a3e635","#e879f9",
];

const defaultGroup = {{ default_group|tojson }};
const defaultExperiment = {{ default_experiment|tojson }};

let allRuns = [];
let allMetricNames = [];
let selectedRunIds = new Set();
let selectedMetrics = new Set();
let experimentId = null;
let uplotInstances = [];
const customLegends = new Map();
let selectedParams = new Set();
let paramsDiffOnly = false;
let pollTimer = null;

// DOM refs
const $exp = document.getElementById("expInput");
const $loadBtn = document.getElementById("loadBtn");
const $refreshBtn = document.getElementById("refreshBtn");
const $topStatus = document.getElementById("topStatus");
const $nameFilter = document.getElementById("nameFilter");
const $tagFilter = document.getElementById("tagFilter");
const $colSlider = document.getElementById("colSlider");
const $colVal = document.getElementById("colVal");
const $selectAll = document.getElementById("selectAllBtn");
const $clearSel = document.getElementById("clearSelBtn");
const $copyFilter = document.getElementById("copyFilterBtn");
const $info = document.getElementById("infoArea");
const $expInfo = document.getElementById("expInfo");
const $tableSection = document.getElementById("tableSection");
const $runCount = document.getElementById("runCount");
const $tbody = document.getElementById("runTableBody");
const $thCheckAll = document.getElementById("thCheckAll");
const $metricSection = document.getElementById("metricSection");
const $metricSearch = document.getElementById("metricSearch");
const $metricBox = document.getElementById("metricBox");
const $metricPills = document.getElementById("metricPills");
const $compareBtn = document.getElementById("compareBtn");
const $chartGrid = document.getElementById("chartGrid");
const $smoothSlider = document.getElementById("smoothSlider");
const $smoothVal = document.getElementById("smoothVal");
const $groupMode = document.getElementById("groupMode");
const $selectedRunsSection = document.getElementById("selectedRunsSection");
const $selectedRunsList = document.getElementById("selectedRunsList");
const $paramsSection = document.getElementById("paramsSection");
const $paramSearch = document.getElementById("paramSearch");
const $paramAddBtn = document.getElementById("paramAddBtn");
const $paramSearchResults = document.getElementById("paramSearchResults");
const $paramPills = document.getElementById("paramPills");
const $paramsTable = document.getElementById("paramsTable");
const $paramsDiffToggle = document.getElementById("paramsDiffToggle");

// ── Helpers ──────────────────────────────────────────────────────────────

function showInfo(msg, cls) {
  $info.innerHTML = `<div class="info-bar ${cls||""}">${msg}</div>`;
}
function clearInfo() { $info.innerHTML = ""; }
function showStatus(html) { $topStatus.innerHTML = html; }
function clearStatus() { $topStatus.innerHTML = ""; }

async function api(url, opts) {
  const resp = await fetch(url, opts);
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
  return data;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString("en-US", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false});
}

function shortTime(iso) {
  const d = new Date(iso);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${mm}/${dd} ${hh}:${mi}`;
}

function getXAxisMode() {
  const radio = document.querySelector('input[name="xaxis"]:checked');
  return radio ? radio.value : "step";
}

function getYScale() {
  const radio = document.querySelector('input[name="yscale"]:checked');
  return radio ? radio.value : "linear";
}

function getSmoothingFactor() {
  return parseFloat($smoothSlider.value) || 0;
}

function emaSmooth(values, alpha) {
  if (alpha <= 0) return values;
  const out = new Float64Array(values.length);
  let ema = NaN;
  for (let i = 0; i < values.length; i++) {
    const v = values[i];
    if (isNaN(v)) { out[i] = NaN; continue; }
    if (isNaN(ema)) { ema = v; }
    else { ema = alpha * ema + (1 - alpha) * v; }
    out[i] = ema;
  }
  return out;
}

function fmtTickVal(self, ticks) {
  if (!ticks || !ticks.length) return ticks;
  const absMax = ticks.reduce((m, v) => Math.max(m, Math.abs(v)), 0);
  if (absMax >= 1e9)       return ticks.map(v => (v / 1e9).toFixed(1) + "G");
  if (absMax >= 1e6)       return ticks.map(v => (v / 1e6).toFixed(1) + "M");
  if (absMax >= 1e4)       return ticks.map(v => (v / 1e3).toFixed(1) + "k");
  if (absMax < 0.01 && absMax > 0) return ticks.map(v => v.toExponential(1));
  return ticks.map(v => {
    if (Number.isInteger(v)) return v.toString();
    const s = v.toPrecision(4);
    return parseFloat(s).toString();
  });
}

function getFilteredRuns() {
  const nf = $nameFilter.value.toLowerCase();
  const tf = $tagFilter.value.toLowerCase();
  return allRuns.filter(r => {
    if (nf && !r.run_name.toLowerCase().includes(nf)) return false;
    if (tf && !r.tags_list.some(t => t.toLowerCase().includes(tf))) return false;
    return true;
  });
}

function getMetricPrefix(m) {
  const idx = m.indexOf("/");
  return idx > 0 ? m.substring(0, idx) : m;
}

function groupMetrics(metrics) {
  const mode = $groupMode.value;
  if (mode === "overlay") {
    return [{ name: "All Metrics", metrics: [...metrics] }];
  }
  if (mode === "prefix") {
    const groups = {};
    metrics.forEach(m => {
      const prefix = getMetricPrefix(m);
      if (!groups[prefix]) groups[prefix] = [];
      groups[prefix].push(m);
    });
    return Object.entries(groups).map(([name, ms]) => ({ name, metrics: ms }));
  }
  return metrics.map(m => ({ name: m, metrics: [m] }));
}

// ── Load experiment & runs ───────────────────────────────────────────────

async function loadExperiment() {
  stopPolling();
  const name = $exp.value.trim();
  if (!name) return showInfo("Enter an experiment name.", "error");

  clearInfo();
  showStatus('<span class="spinner"></span> Loading…');
  $tableSection.style.display = "none";
  $metricSection.style.display = "none";
  $chartGrid.innerHTML = "";

  try {
    const expData = await api(`/api/experiment?name=${encodeURIComponent(name)}`);
    experimentId = expData.experiment_id;
    $expInfo.textContent = `Experiment ID: ${experimentId}`;

    const runsData = await api(`/api/runs?experiment_id=${encodeURIComponent(experimentId)}`);
    allRuns = runsData.runs;

    if (!allRuns.length) {
      clearStatus();
      return showInfo("No runs found for this experiment.", "");
    }

    const metricSet = new Set();
    allRuns.forEach(r => (r.metric_keys||[]).forEach(k => metricSet.add(k)));
    allMetricNames = [...metricSet].sort();

    selectedRunIds = new Set([...selectedRunIds].filter(id => allRuns.some(r => r.run_id === id)));

    renderTable();
    renderSelectedRuns();
    renderMetricSelector();
    $tableSection.style.display = "";
    $metricSection.style.display = "";
    clearStatus();
  } catch (err) {
    clearStatus();
    showInfo(err.message, "error");
  }
}

// ── Table rendering ──────────────────────────────────────────────────────

function renderTable() {
  const filtered = getFilteredRuns();
  $runCount.textContent = `(${filtered.length} of ${allRuns.length})`;

  const html = filtered.map(r => {
    const checked = selectedRunIds.has(r.run_id) ? "checked" : "";
    const tags = (r.tags_list||[]).map(t => `<span class="tag-chip" title="${t}">${t}</span>`).join("");
    return `<tr>
      <td><input type="checkbox" class="run-cb" data-id="${r.run_id}" ${checked}></td>
      <td>${esc(r.run_name)}</td>
      <td style="white-space:nowrap">${formatTime(r.start_time)}</td>
      <td><span class="status-badge status-${r.status}">${r.status}</span></td>
      <td class="mono">${r.run_id}</td>
      <td>${tags}</td>
    </tr>`;
  }).join("");
  $tbody.innerHTML = html;

  const allChecked = filtered.length > 0 && filtered.every(r => selectedRunIds.has(r.run_id));
  $thCheckAll.checked = allChecked;
  $thCheckAll.indeterminate = !allChecked && filtered.some(r => selectedRunIds.has(r.run_id));
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

$tbody.addEventListener("change", e => {
  if (!e.target.classList.contains("run-cb")) return;
  const id = e.target.dataset.id;
  if (e.target.checked) selectedRunIds.add(id); else selectedRunIds.delete(id);
  const filtered = getFilteredRuns();
  const allChecked = filtered.length > 0 && filtered.every(r => selectedRunIds.has(r.run_id));
  $thCheckAll.checked = allChecked;
  $thCheckAll.indeterminate = !allChecked && filtered.some(r => selectedRunIds.has(r.run_id));
  renderSelectedRuns();
});

$thCheckAll.addEventListener("change", () => {
  const filtered = getFilteredRuns();
  if ($thCheckAll.checked) {
    filtered.forEach(r => selectedRunIds.add(r.run_id));
  } else {
    filtered.forEach(r => selectedRunIds.delete(r.run_id));
  }
  renderTable();
  renderSelectedRuns();
});

$metricBox.addEventListener("change", e => {

// ── Selected runs panel ──────────────────────────────────────────────────

function getRunLabel(runId) {
  if (customLegends.has(runId)) return customLegends.get(runId);
  const run = allRuns.find(r => r.run_id === runId);
  return run ? run.run_name : runId.slice(0, 8);
}

function getRunColor(runId) {
  let idx = 0;
  for (const id of selectedRunIds) {
    if (id === runId) return COLORS[idx % COLORS.length];
    idx++;
  }
  return COLORS[0];
}

function renderSelectedRuns() {
  const ids = [...selectedRunIds];
  if (!ids.length) {
    $selectedRunsSection.style.display = "none";
    renderParamsSection();
    return;
  }
  $selectedRunsSection.style.display = "";

  $selectedRunsList.innerHTML = ids.map((id, i) => {
    const run = allRuns.find(r => r.run_id === id);
    const name = run ? run.run_name : id.slice(0, 8);
    const legend = customLegends.has(id) ? customLegends.get(id) : name;
    const color = COLORS[i % COLORS.length];
    const expName = experimentId || "";
    return `<div class="sr-card" data-id="${id}">
      <span class="sr-dot" style="background:${color}"></span>
      <div class="sr-info">
        <input class="sr-legend-input" type="text" value="${esc(legend)}" data-id="${id}" placeholder="${esc(name)}">
        <div class="sr-exp" title="${esc(expName)}">${esc(expName)}</div>
      </div>
      <button class="sr-remove" data-id="${id}" title="Deselect run">&times;</button>
    </div>`;
  }).join("");

  renderParamsSection();
}

$selectedRunsList.addEventListener("input", e => {
  if (!e.target.classList.contains("sr-legend-input")) return;
  const id = e.target.dataset.id;
  const val = e.target.value.trim();
  const run = allRuns.find(r => r.run_id === id);
  const defaultName = run ? run.run_name : id.slice(0, 8);
  if (val && val !== defaultName) {
    customLegends.set(id, val);
  } else {
    customLegends.delete(id);
  }
});

$selectedRunsList.addEventListener("click", e => {
  const btn = e.target.closest(".sr-remove");
  if (!btn) return;
  selectedRunIds.delete(btn.dataset.id);
  renderTable();
  renderSelectedRuns();
});

// ── Parameters comparison ────────────────────────────────────────────────

function getAllParamKeys() {
  const ids = [...selectedRunIds];
  const keys = new Set();
  ids.forEach(id => {
    const run = allRuns.find(r => r.run_id === id);
    if (run && run.params) Object.keys(run.params).forEach(k => keys.add(k));
  });
  return [...keys].sort();
}

function renderParamsSection() {
  const ids = [...selectedRunIds];
  if (!ids.length) {
    $paramsSection.style.display = "none";
    return;
  }
  $paramsSection.style.display = "";

  const runs = ids.map((id, i) => {
    const run = allRuns.find(r => r.run_id === id);
    const name = customLegends.has(id) ? customLegends.get(id) : (run ? run.run_name : id.slice(0, 8));
    const color = COLORS[i % COLORS.length];
    return { id, run, name, color, params: (run && run.params) ? run.params : {} };
  });

  let paramKeys = getAllParamKeys();

  if (selectedParams.size > 0) {
    paramKeys = paramKeys.filter(k => selectedParams.has(k));
  }

  if (paramsDiffOnly) {
    paramKeys = paramKeys.filter(k => {
      const vals = runs.map(r => r.params[k] ?? "");
      return new Set(vals).size > 1;
    });
  }

  renderParamPills();

  if (!paramKeys.length) {
    $paramsTable.innerHTML = `<tr><td class="params-empty" colspan="${runs.length + 1}">${
      paramsDiffOnly ? "No differing parameters found." : "No parameters available."
    }</td></tr>`;
    return;
  }

  const headerCells = `<th>Parameter</th>` + runs.map(r =>
    `<th><span class="param-dot" style="background:${r.color}"></span>${esc(r.name)}</th>`
  ).join("");

  const bodyRows = paramKeys.map(k => {
    const vals = runs.map(r => r.params[k] ?? "");
    const unique = new Set(vals);
    const isDiff = unique.size > 1;
    const cells = vals.map(v =>
      `<td class="${isDiff ? 'param-diff' : ''}" title="${esc(v)}">${esc(v)}</td>`
    ).join("");
    return `<tr><td>${esc(k)}</td>${cells}</tr>`;
  }).join("");

  $paramsTable.innerHTML = `<thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody>`;
}

function renderParamPills() {
  if (!selectedParams.size) {
    $paramPills.innerHTML = "";
    return;
  }
  $paramPills.innerHTML = [...selectedParams].map(p =>
    `<span class="ms-pill" data-param="${esc(p)}">${esc(p)}</span>`
  ).join("");
}

$paramsDiffToggle.addEventListener("click", () => {
  paramsDiffOnly = !paramsDiffOnly;
  $paramsDiffToggle.classList.toggle("params-toggle-active", paramsDiffOnly);
  renderParamsSection();
});

$paramSearch.addEventListener("input", () => {
  const q = $paramSearch.value.toLowerCase().trim();
  if (!q) {
    $paramSearchResults.style.display = "none";
    $paramSearchResults.innerHTML = "";
    return;
  }
  const allKeys = getAllParamKeys();
  const matches = allKeys.filter(k => k.toLowerCase().includes(q) && !selectedParams.has(k)).slice(0, 20);
  if (!matches.length) {
    $paramSearchResults.style.display = "none";
    return;
  }
  $paramSearchResults.style.display = "";
  $paramSearchResults.innerHTML = matches.map(k =>
    `<div class="param-search-item" data-key="${esc(k)}">${esc(k)}</div>`
  ).join("");
});

$paramSearchResults.addEventListener("click", e => {
  const item = e.target.closest(".param-search-item");
  if (!item) return;
  selectedParams.add(item.dataset.key);
  $paramSearch.value = "";
  $paramSearchResults.style.display = "none";
  $paramSearchResults.innerHTML = "";
  renderParamsSection();
});

$paramAddBtn.addEventListener("click", () => {
  const q = $paramSearch.value.trim();
  if (!q) return;
  const allKeys = getAllParamKeys();
  const exact = allKeys.find(k => k === q);
  const match = exact || allKeys.find(k => k.toLowerCase().includes(q.toLowerCase()));
  if (match) {
    selectedParams.add(match);
    $paramSearch.value = "";
    $paramSearchResults.style.display = "none";
    $paramSearchResults.innerHTML = "";
    renderParamsSection();
  }
});

$paramSearch.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    $paramAddBtn.click();
  }
});

$paramPills.addEventListener("click", e => {
  const pill = e.target.closest(".ms-pill");
  if (!pill) return;
  selectedParams.delete(pill.dataset.param);
  renderParamsSection();
});

document.addEventListener("click", e => {
  if (!$paramSearch.contains(e.target) && !$paramSearchResults.contains(e.target)) {
    $paramSearchResults.style.display = "none";
  }
});

let lastChartData = null;
let lastChartMetrics = [];

function renderCharts() {
  if (!lastChartData) return;
  uplotInstances.forEach(u => u.destroy());
  uplotInstances = [];
  $chartGrid.innerHTML = "";

// ── Auto-refresh polling ─────────────────────────────────────────────────

function stopPolling() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  updatePollIndicator();
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(pollMetrics, 30000);
  updatePollIndicator();
}

async function pollMetrics() {
  const runIds = [...selectedRunIds];
  const metrics = lastChartMetrics;
  if (!runIds.length || !metrics.length) {
    stopPolling();
    return;
  }
  try {
    const data = await api("/api/metric-history", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({run_ids: runIds, metrics, skip_cache: true}),
    });
    lastChartData = data;
    uplotInstances.forEach(u => u.destroy());
    uplotInstances = [];
    $chartGrid.innerHTML = "";
    const cols = parseInt($colSlider.value, 10);
    $chartGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    drawChartsFromData(data, metrics);
  } catch (err) {
    console.warn("Auto-refresh poll failed:", err);
  }
}

function updatePollIndicator() {
  const el = document.getElementById("pollIndicator");
  if (el) el.style.display = pollTimer ? "" : "none";
}

// ── Chart loading ────────────────────────────────────────────────────────

async function loadCharts() {
  stopPolling();
  const runIds = [...selectedRunIds];
  const metrics = [...selectedMetrics];

  if (!runIds.length) return showInfo("Select one or more runs above to compare metrics.");
  if (!metrics.length) return showInfo("Select one or more metrics above to view charts.");

  clearInfo();
  showStatus('<span class="spinner"></span> Loading metrics…');

  uplotInstances.forEach(u => u.destroy());
  uplotInstances = [];
  $chartGrid.innerHTML = "";

  try {
    const data = await api("/api/metric-history", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({run_ids: runIds, metrics}),
    });

    lastChartData = data;
    lastChartMetrics = metrics;

    const cols = parseInt($colSlider.value, 10);
    $chartGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    drawChartsFromData(data, metrics);
    clearStatus();
    startPolling();
  } catch (err) {
    clearStatus();
    showInfo(err.message, "error");
  }
}

function drawChartsFromData(data, metrics) {
  const byMetric = {};
  data.results.forEach(r => {
    if (!byMetric[r.metric]) byMetric[r.metric] = [];
    byMetric[r.metric].push(r);
  });

  // Stable color assignment: each run_id gets a fixed color index
  // based on its position in selectedRunIds (insertion order)
  const runColorMap = {};
  let colorIdx = 0;
  [...selectedRunIds].forEach(id => {
    runColorMap[id] = COLORS[colorIdx % COLORS.length];
    colorIdx++;
  });

  const useWall = getXAxisMode() === "wall";
  const yScaleMode = getYScale();
  const smoothAlpha = getSmoothingFactor();
  const groups = groupMetrics(metrics);

  groups.forEach(group => {
    const card = document.createElement("div");
    card.className = "chart-card";

    const header = document.createElement("div");
    header.className = "chart-header";
    const title = document.createElement("div");
    title.className = "chart-title";
    title.textContent = group.name + (useWall ? "  (wall time)" : "");
    title.title = group.metrics.join(", ");
    header.appendChild(title);

    const toolbar = document.createElement("div");
    toolbar.className = "chart-toolbar";
    const resetBtn = document.createElement("button");
    resetBtn.textContent = "Reset Zoom";
    resetBtn.title = "Double-click chart to reset zoom";
    toolbar.appendChild(resetBtn);
    header.appendChild(toolbar);
    card.appendChild(header);

    const allEntries = [];
    group.metrics.forEach(metric => {
      const entries = (byMetric[metric]||[]).filter(e => e.steps && e.steps.length > 0);
      entries.forEach(e => allEntries.push({ ...e, _metric: metric }));
    });

    if (!allEntries.length) {
      const empty = document.createElement("div");
      empty.className = "chart-empty";
      empty.textContent = `No data for ${group.name}`;
      card.appendChild(empty);
      $chartGrid.appendChild(card);
      return;
    }

    const wrap = document.createElement("div");
    card.appendChild(wrap);
    $chartGrid.appendChild(card);

    const multiMetric = group.metrics.length > 1;
    let xArr, series, uData, xLabel;

    if (useWall && allEntries[0].timestamps && allEntries[0].timestamps.length) {
      xLabel = "Hours";
      const relData = allEntries.map(entry => {
        const t0 = entry.timestamps[0] || 0;
        return {
          xs: entry.timestamps.map(ts => (ts - t0) / 3600000),
          ys: entry.values,
          entry,
        };
      });
      const allX = new Set();
      relData.forEach(d => d.xs.forEach(x => allX.add(x)));
      xArr = [...allX].sort((a, b) => a - b);
      const xIdx = {};
      xArr.forEach((v, i) => { xIdx[v] = i; });

      series = [{ label: xLabel }];
      uData = [new Float64Array(xArr)];

      relData.forEach((d, i) => {
        const metricSuffix = multiMetric ? ` [${d.entry._metric.split("/").pop()}]` : "";
        const label = getRunLabel(d.entry.run_id) + metricSuffix;
        series.push({
          label,
          stroke: runColorMap[d.entry.run_id] || COLORS[i % COLORS.length],
          width: 1.5,
        });
        let yArr = new Float64Array(xArr.length).fill(NaN);
        for (let j = 0; j < d.xs.length; j++) {
          yArr[xIdx[d.xs[j]]] = d.ys[j];
        }
        if (smoothAlpha > 0) yArr = emaSmooth(yArr, smoothAlpha);
        uData.push(yArr);
      });
    } else {
      xLabel = "Step";
      const allSteps = new Set();
      allEntries.forEach(e => e.steps.forEach(s => allSteps.add(s)));
      xArr = [...allSteps].sort((a, b) => a - b);
      const xIdx = {};
      xArr.forEach((v, i) => { xIdx[v] = i; });

      series = [{ label: xLabel }];
      uData = [new Float64Array(xArr)];

      allEntries.forEach((entry, i) => {
        const metricSuffix = multiMetric ? ` [${entry._metric.split("/").pop()}]` : "";
        const label = getRunLabel(entry.run_id) + metricSuffix;
        series.push({
          label,
          stroke: runColorMap[entry.run_id] || COLORS[i % COLORS.length],
          width: 1.5,
        });
        let yArr = new Float64Array(xArr.length).fill(NaN);
        for (let j = 0; j < entry.steps.length; j++) {
          yArr[xIdx[entry.steps[j]]] = entry.values[j];
        }
        if (smoothAlpha > 0) yArr = emaSmooth(yArr, smoothAlpha);
        uData.push(yArr);
      });
    }

    const rect = wrap.getBoundingClientRect();
    const width = Math.max(rect.width || card.clientWidth - 20, 280);

    const isLog = yScaleMode === "log";

    const yAxisLabel = multiMetric ? group.name : group.metrics[0].split("/").pop();

    const opts = {
      width,
      height: 280,
      cursor: {
        drag: { x: true, y: true, uni: 50 },
        focus: { prox: 30 },
      },
      select: {
        show: true,
      },
      scales: {
        x: { time: false },
        y: {
          distr: isLog ? 3 : 1,
          auto: true,
          range: (u, dMin, dMax) => {
            if (isLog) {
              const lo = dMin > 0 ? dMin : 1e-10;
              return [lo, dMax > lo ? dMax : lo * 10];
            }
            if (dMin === dMax) return [dMin - 1, dMax + 1];
            const pad = (dMax - dMin) * 0.05;
            return [dMin - pad, dMax + pad];
          },
        },
      },
      axes: [
        {
          label: xLabel,
          size: 35,
          font: "11px -apple-system, BlinkMacSystemFont, sans-serif",
          stroke: "#9ca3af",
          ticks: { stroke: "#363840", width: 1 },
          grid: { stroke: "#2a2c34", width: 1 },
          values: fmtTickVal,
        },
        {
          label: yAxisLabel,
          size: 55,
          font: "11px -apple-system, BlinkMacSystemFont, sans-serif",
          stroke: "#9ca3af",
          ticks: { stroke: "#363840", width: 1 },
          grid: { stroke: "#2a2c34", width: 1 },
          values: fmtTickVal,
        },
      ],
      hooks: {
        setSelect: [
          function(u) {
            const sel = u.select;
            if (sel.width < 2 && sel.height < 2) return;

            const xMin = u.posToVal(sel.left, "x");
            const xMax = u.posToVal(sel.left + sel.width, "x");
            const yMin = u.posToVal(sel.top + sel.height, "y");
            const yMax = u.posToVal(sel.top, "y");

            u.setScale("x", { min: xMin, max: xMax });
            u.setScale("y", { min: yMin, max: yMax });

            sel.width = 0;
            sel.height = 0;
          }
        ],
      },
      series,
      legend: {
        show: true,
        live: true,
      },
    };

    const u = new uPlot(opts, uData, wrap);

    // Store original data range for reset
    const origXMin = xArr[0];
    const origXMax = xArr[xArr.length - 1];

    function resetZoom() {
      u.setScale("x", { min: origXMin, max: origXMax });
      let gMin = Infinity, gMax = -Infinity;
      for (let si = 1; si < uData.length; si++) {
        for (let j = 0; j < uData[si].length; j++) {
          const v = uData[si][j];
          if (!isNaN(v)) {
            if (v < gMin) gMin = v;
            if (v > gMax) gMax = v;
          }
        }
      }
      if (gMin === Infinity) { gMin = 0; gMax = 1; }
      if (isLog) {
        gMin = gMin > 0 ? gMin : 1e-10;
      } else {
        const pad = (gMax - gMin) * 0.05 || 1;
        gMin -= pad;
        gMax += pad;
      }
      u.setScale("y", { min: gMin, max: gMax });
    }

    resetBtn.addEventListener("click", resetZoom);

    // Double-click on the chart area to reset zoom
    wrap.addEventListener("dblclick", resetZoom);

    // Scroll wheel zoom on x-axis
    wrap.addEventListener("wheel", e => {
      e.preventDefault();
      const cursor = u.cursor;
      const left = cursor.left;
      if (left == null || left < 0) return;

      const xVal = u.posToVal(left, "x");
      const scaleX = u.scales.x;
      const xMin = scaleX.min;
      const xMax = scaleX.max;
      const range = xMax - xMin;

      const zoomFactor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
      const newRange = range * zoomFactor;
      const ratio = (xVal - xMin) / range;

      const newMin = xVal - newRange * ratio;
      const newMax = xVal + newRange * (1 - ratio);

      u.setScale("x", { min: newMin, max: newMax });
    }, { passive: false });

    uplotInstances.push(u);
  });
}

// Resize charts on window resize (debounced)
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    uplotInstances.forEach(u => {
      const wrap = u.root.parentElement;
      if (wrap) {
        const w = wrap.clientWidth;
        if (w > 0) u.setSize({ width: w, height: 280 });
      }
    });
  }, 150);
});

// ── Event wiring ─────────────────────────────────────────────────────────

$loadBtn.addEventListener("click", loadExperiment);
$exp.addEventListener("keydown", e => { if (e.key === "Enter") loadExperiment(); });

$refreshBtn.addEventListener("click", async () => {
  showStatus('<span class="spinner"></span> Clearing cache…');
  try { await api("/api/clear-cache", {method:"POST"}); } catch(e) {}
  loadExperiment();
});

let filterDebounce;
function onFilterChange() {
  clearTimeout(filterDebounce);
  filterDebounce = setTimeout(renderTable, 80);
}
$nameFilter.addEventListener("input", onFilterChange);
$tagFilter.addEventListener("input", onFilterChange);

$colSlider.addEventListener("input", () => {
  $colVal.textContent = $colSlider.value;
  $chartGrid.style.gridTemplateColumns = `repeat(${$colSlider.value}, 1fr)`;
  setTimeout(() => {
    uplotInstances.forEach(u => {
      const wrap = u.root.parentElement;
      if (wrap) {
        const w = wrap.clientWidth;
        if (w > 0) u.setSize({ width: w, height: 280 });
      }
    });
  }, 50);
});

$smoothSlider.addEventListener("input", () => {
  $smoothVal.textContent = $smoothSlider.value;
});
$smoothSlider.addEventListener("change", renderCharts);

$selectAll.addEventListener("click", () => {
  getFilteredRuns().forEach(r => selectedRunIds.add(r.run_id));
  renderTable();
  renderSelectedRuns();
});
$clearSel.addEventListener("click", () => {
  stopPolling();
  selectedRunIds.clear();
  renderTable();
  renderSelectedRuns();
});

$copyFilter.addEventListener("click", () => {
  if (!selectedRunIds.size) return showInfo("No runs selected.", "error");
  const ids = [...selectedRunIds].sort().map(id => `'${id}'`).join(", ");
  const filter = `attributes.run_id IN (${ids})`;
  navigator.clipboard.writeText(filter).then(() => {
    showInfo("MLflow filter copied to clipboard!", "success");
    setTimeout(clearInfo, 2000);
  }).catch(() => {
    showInfo(`<code>${filter}</code>`, "");
  });
});

$compareBtn.addEventListener("click", loadCharts);

document.querySelectorAll('input[name="xaxis"]').forEach(radio => {
  radio.addEventListener("change", renderCharts);
});
document.querySelectorAll('input[name="yscale"]').forEach(radio => {
  radio.addEventListener("change", renderCharts);
});
$groupMode.addEventListener("change", renderCharts);

document.querySelectorAll('input[name="runtype"]').forEach(radio => {
  radio.addEventListener("change", () => {
    renderMetricSelector(true);
  });
});

// ── View state persistence ───────────────────────────────────────────────

function serializeViewState() {
  const legends = {};
  customLegends.forEach((v, k) => { legends[k] = v; });
  return {
    v: 1,
    experiment: $exp.value.trim(),
    runs: [...selectedRunIds],
    metrics: [...selectedMetrics],
    legends,
    settings: {
      runType: (document.querySelector('input[name="runtype"]:checked') || {}).value || "training",
      xaxis: getXAxisMode(),
      yscale: getYScale(),
      smoothing: getSmoothingFactor(),
      colsPerRow: parseInt($colSlider.value, 10),
      grouping: $groupMode.value,
    },
  };
}

function applyViewState(state) {
  if (!state || !state.experiment) return false;

  // Set experiment
  $exp.value = state.experiment;

  // Settings
  const s = state.settings || {};
  if (s.runType) {
    const radio = document.querySelector(`input[name="runtype"][value="${s.runType}"]`);
    if (radio) radio.checked = true;
  }
  if (s.xaxis) {
    const radio = document.querySelector(`input[name="xaxis"][value="${s.xaxis}"]`);
    if (radio) radio.checked = true;
  }
  if (s.yscale) {
    const radio = document.querySelector(`input[name="yscale"][value="${s.yscale}"]`);
    if (radio) radio.checked = true;
  }
  if (s.smoothing != null) {
    $smoothSlider.value = s.smoothing;
    $smoothVal.textContent = s.smoothing;
  }
  if (s.colsPerRow) {
    $colSlider.value = s.colsPerRow;
    $colVal.textContent = s.colsPerRow;
  }
  if (s.grouping) {
    $groupMode.value = s.grouping;
  }

  // Legends
  customLegends.clear();
  if (state.legends) {
    Object.entries(state.legends).forEach(([k, v]) => customLegends.set(k, v));
  }

  // Runs and metrics will be applied after experiment loads
  const pendingRuns = state.runs || [];
  const pendingMetrics = state.metrics || [];

  return { pendingRuns, pendingMetrics };
}

function encodeViewHash(state) {
  const json = JSON.stringify(state);
  return btoa(unescape(encodeURIComponent(json)));
}

function decodeViewHash(hash) {
  try {
    const json = decodeURIComponent(escape(atob(hash)));
    return JSON.parse(json);
  } catch { return null; }
}

// Share URL
document.getElementById("shareViewBtn").addEventListener("click", () => {
  const state = serializeViewState();
  const hash = encodeViewHash(state);
  const url = `${location.origin}${location.pathname}#view=${hash}`;
  navigator.clipboard.writeText(url).then(() => {
    showInfo("Shareable URL copied to clipboard!", "success");
    setTimeout(clearInfo, 2500);
  }).catch(() => {
    history.replaceState(null, "", `#view=${hash}`);
    showInfo("URL updated in address bar. Copy it to share.", "success");
    setTimeout(clearInfo, 2500);
  });
});

// Export JSON
document.getElementById("exportViewBtn").addEventListener("click", () => {
  const state = serializeViewState();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const expName = $exp.value.trim().replace(/\//g, "_") || "view";
  a.download = `mlflow-view_${expName}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// Import JSON
const $importFile = document.getElementById("importFileInput");
document.getElementById("importViewBtn").addEventListener("click", () => {
  $importFile.click();
});
$importFile.addEventListener("change", () => {
  const file = $importFile.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const state = JSON.parse(reader.result);
      restoreFromState(state);
    } catch (err) {
      showInfo("Invalid view file: " + err.message, "error");
    }
  };
  reader.readAsText(file);
  $importFile.value = "";
});

async function restoreFromState(state) {
  const pending = applyViewState(state);
  if (!pending) return showInfo("Invalid view state.", "error");

  clearInfo();
  showStatus('<span class="spinner"></span> Restoring view…');
  $tableSection.style.display = "none";
  $metricSection.style.display = "none";
  $chartGrid.innerHTML = "";

  try {
    const expData = await api(`/api/experiment?name=${encodeURIComponent($exp.value.trim())}`);
    experimentId = expData.experiment_id;
    $expInfo.textContent = `Experiment ID: ${experimentId}`;

    const runsData = await api(`/api/runs?experiment_id=${encodeURIComponent(experimentId)}`);
    allRuns = runsData.runs;

    if (!allRuns.length) {
      clearStatus();
      return showInfo("No runs found for this experiment.", "");
    }

    const metricSet = new Set();
    allRuns.forEach(r => (r.metric_keys||[]).forEach(k => metricSet.add(k)));
    allMetricNames = [...metricSet].sort();

    // Restore selections — only keep IDs that still exist
    const validIds = new Set(allRuns.map(r => r.run_id));
    selectedRunIds = new Set(pending.pendingRuns.filter(id => validIds.has(id)));
    selectedMetrics = new Set(pending.pendingMetrics.filter(m => allMetricNames.includes(m)));

    renderTable();
    renderSelectedRuns();
    renderMetricList();
    renderMetricPills();
    $tableSection.style.display = "";
    $metricSection.style.display = "";
    clearStatus();

    // Auto-compare if we have selections
    if (selectedRunIds.size && selectedMetrics.size) {
      loadCharts();
    }
  } catch (err) {
    clearStatus();
    showInfo(err.message, "error");
  }
}

// ── Startup ──────────────────────────────────────────────────────────────

(function init() {
  const hash = location.hash;
  if (hash.startsWith("#view=")) {
    const state = decodeViewHash(hash.slice(6));
    if (state) {
      restoreFromState(state);
      return;
    }
  }
  $exp.value = `${defaultGroup}/${defaultExperiment}`;
  loadExperiment();
})();

})();
</script>
